# hqt – Hybrid Trading Database System
# docker compose up -d  (all services)
# Optional: docker compose up -d --build  (rebuild postgres image)

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: hqt-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: hqt-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    image: hqt-postgres:latest
    container_name: hqt-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hqt
      POSTGRES_PASSWORD: hqt_secret
      POSTGRES_DB: hqt
    command: postgres -c shared_preload_libraries=timescaledb,age
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hqt -d hqt" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hqt-redis
    hostname: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: hqt-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.3.0
    container_name: hqt-grafana
    hostname: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./module5_security/grafana_provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hqt-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/create_kafka_topics.sh:/create_kafka_topics.sh:ro
    entrypoint: [ "bash", "/create_kafka_topics.sh" ]

  lob-engine:
    build:
      context: .
      dockerfile: module1_lob/Dockerfile
    container_name: hqt-lob
    hostname: lob-engine
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8001/lob/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  data-ingestor:
    build:
      context: .
      dockerfile: module2_timescale/Dockerfile
    container_name: hqt-data-ingestor
    hostname: data-ingestor
    env_file:
      - .env
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8002/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  graph-service:
    build:
      context: .
      dockerfile: module3_graph/Dockerfile
    container_name: hqt-graph
    hostname: graph-service
    env_file:
      - .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      lob-engine:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  quantum-engine:
    build:
      context: .
      dockerfile: module4_quantum/Dockerfile
    container_name: hqt-quantum
    hostname: quantum-engine
    env_file:
      - .env
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8004/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi-proxy:
    build:
      context: .
      dockerfile: module5_security/Dockerfile
    container_name: hqt-fastapi
    hostname: fastapi-proxy
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lob-engine:
        condition: service_healthy
      quantum-engine:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: hqt-postgres-exporter
    hostname: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://hqt:hqt_secret@postgres:5432/hqt?sslmode=disable

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: hqt-redis-exporter
    hostname: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379

  node-exporter:
    image: prom/node-exporter:latest
    container_name: hqt-node-exporter
    hostname: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

volumes:
  postgres_data:
  grafana_data:
