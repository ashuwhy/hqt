apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false

  - name: TimescaleDB
    type: postgres
    url: postgres:5432
    user: hqt
    secureJsonData:
      password: hqt_secret
    jsonData:
      database: hqt
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: false
    editable: false
